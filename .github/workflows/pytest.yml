---
name: Run Pytest

on:
  push:
    branches: [master, main]
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]
    branches: [master, main]

permissions:
  contents: read

jobs:
  pytest:
    name: Run Pytest
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.14"]

    steps:
      - name: Checkout Code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          fetch-depth: 0
      # INTEGRITY CHECK: If requirements.txt changed, PR MUST have 'verified-deps' label
      - name: Verify Requirements Integrity
        if: |
          github.event_name == 'pull_request' &&
          !contains(github.event.pull_request.labels.*.name, 'verified-deps')
        run: |
          git show origin/main:requirements.txt > requirements.txt.orig

          if ! diff -q requirements.txt requirements.txt.orig > /dev/null; then
            echo "::error::SECURITY ALERT: requirements.txt was modified."
            echo "A maintainer must verify the changes and add the 'verified-deps' label."
            exit 1
          fi
      - name: Python ${{ matrix.python-version }}
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # INCLUDED in the requirements.
          # pip install  pytest
          pip install --require-hashes -r requirements.txt -r requirements-dev.txt
      - name: Test with pytest
        run: |
          pytest
